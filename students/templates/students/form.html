{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <h3>{{ view.object|default_if_none:"Add Student" }}</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Save</button>
        <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
