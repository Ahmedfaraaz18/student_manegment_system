<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
        <h4 class="text-center">SMS Panel</h4>
        <hr>

        <ul class="nav flex-column">
            <li class="nav-item mb-2">
                <a class="nav-link text-white" href="/">🏠 Dashboard</a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link text-white" href="{% url 'student_list' %}">👨‍🎓 Students</a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link text-white" href="{% url 'academicunit_list' %}">🏫 Academic Units</a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link text-white" href="#">📊 Reports</a>
            </li>
            <li class="nav-item">
    <a href="{% url 'institution_list' %}" class="nav-link text-white">
        🏫 Institutions
    </a>
</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="grow">

        <!-- Top Navbar -->
        <nav class="navbar navbar-light bg-light shadow-sm px-4">
            <span class="navbar-brand mb-0 h5">Student Management System</span>
        </nav>

        <!-- Page Content -->
        <div class="p-4">
            {% block content %}
            {% endblock %}
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
