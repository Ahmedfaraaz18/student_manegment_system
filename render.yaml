services:
  - type: web
    name: student-management-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: student-management-api.onrender.com
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: https://student-management-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://student-management-api.onrender.com,https://student-management-frontend.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: AI_CHAT_RATE_LIMIT
        value: 20/hour

  - type: static
    name: student-management-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://student-management-api.onrender.com/api
